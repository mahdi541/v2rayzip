name: Download, Split and Commit

on:
  push:
    branches:
      - main

jobs:
  split-file:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Download file
      - name: Download v2rayN
        run: |
          mkdir -p downloads
          curl -L -o downloads/v2rayN.zip https://github.com/2dust/v2rayN/releases/download/7.21.3/v2rayN-windows-64.zip

      # 3. Split into chunks (50MB each)
      - name: Split file
        run: |
          mkdir -p chunks
          split -b 50M downloads/v2rayN.zip chunks/v2rayN_part_

      # 4. Configure Git
      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      # 5. Commit chunks
      - name: Commit and push chunks
        run: |
          git add chunks/
          git commit -m "Add v2rayN split archive" || echo "No changes to commit"
          git push
