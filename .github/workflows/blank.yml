name: Download, Split (15M) and Commit

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  split-file:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Download file
      - name: Download v2rayN
        run: |
          mkdir -p downloads
          curl -L -o downloads/v2rayN.zip https://github.com/2dust/v2rayN/releases/download/7.21.3/v2rayN-windows-64.zip

      # 3. Split into 40MB chunks
      - name: Split file (40MB)
        run: |
          mkdir -p chunks
          split -b 15M downloads/v2rayN.zip chunks/v2rayN_part_

      # 4. Git config
      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      # 5. Commit & push
      - name: Commit and push
        run: |
          git add chunks/
          git commit -m "Add 40MB split archive" || echo "No changes"
          git push
